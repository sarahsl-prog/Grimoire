title: Linux Suspicious Network Connection
id: b52a66f8-3d8e-4e2a-9c1d-5b7a9f3e8d2c
status: experimental
description: Detects suspicious outbound network connections from Linux hosts
author: Thomas Patzke
level: medium
logsource:
    product: linux
    category: network_connection
detection:
    selection:
        Initiated: 'true'
        DestinationPort:
            - 4444
            - 5555
            - 6666
    condition: selection
falsepositives:
    - Legitimate remote administration tools
tags:
    - attack.command_and_control
    - attack.t1095
---
title: AWS CloudTrail Root Account Usage
id: c83a66f9-4d9f-5e3b-0c2e-6c8b0f4f9e3d
status: stable
description: Detects usage of the root account in AWS
author: falcon
level: critical
logsource:
    product: aws
    service: cloudtrail
    category: logon
detection:
    selection:
        userIdentity.type: Root
    condition: selection
falsepositives:
    - Emergency access procedures
tags:
    - attack.initial_access
    - attack.t1078.004
