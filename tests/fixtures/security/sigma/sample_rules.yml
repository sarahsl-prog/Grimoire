title: macOS Suspicious Installer Package
id: d94b77a0-5ea0-6f4c-1d3f-7d9c1e5g0f4e
status: test
description: Detects suspicious installer package execution on macOS
author: custom
date: 2024-01-15
level: low
logsource:
    product: macos
    category: process_creation
detection:
    selection:
        CommandLine|contains:
            - 'installer -pkg'
            - 'open -a Installer'
    condition: selection
falsepositives:
    - Legitimate software installations
tags:
    - attack.execution
    - attack.t1059.002
