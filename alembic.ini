# Alembic database migration configuration

[alembic]
# path to migration scripts
script_location = alembic

# database URL (will be overridden via env.py)
sqlalchemy.url = postgresql+asyncpg://user:pass@localhost/grimoire

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

# Migration naming conventions
[naming_conventions]
ix = ix_%(column_0_label)s
uq = uq_%(table_name)s_%(column_0_name)s
ck = ck_%(table_name)s_%(constraint_name)s
fk = fk_%(table_name)s_%(column_0_name)s_%(referred_table_name)s
pk = pk_%(table_name)s